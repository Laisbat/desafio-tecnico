<div class="usuarios-container">
  <div class="list-actions" layout="row" layout-xs="column">
    <mat-form-field>
      <mat-label>Filtrar</mat-label>
      <input
        matInput
        (keyup)="applyFilter($event)"
        placeholder="Ex. Carlos"
        #input
      />
    </mat-form-field>
    <button
      mat-raised-button
      class="custom-button"
      (click)="reloadUsers()"
      matTooltip="Recarregar tabela"
      [disabled]="isLoading"
    >
      <mat-icon>refresh</mat-icon>
    </button>
    <button
      mat-raised-button
      class="custom-button"
      matTooltip="Adicionar usuário"
      [disabled]="isLoading"
      [routerLink]="['/usuarios/adicionar']"
    >
      <mat-icon>person_add</mat-icon>
    </button>
  </div>

  <div class="table-container">
    <div *ngIf="isLoading" class="loading-container">
      <mat-spinner diameter="40"></mat-spinner>
      <p>Carregando usuários...</p>
    </div>

    <div class="tabela-scroll" [hidden]="isLoading">
      <table mat-table [dataSource]="dataSource" matSort>
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
          <td mat-cell *matCellDef="let row">{{ row.id }}</td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Status</th>
          <td mat-cell *matCellDef="let row">
            <div class="status-indicator">
              <span class="status-dot active"></span>
            </div>
          </td>
        </ng-container>

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Nome</th>
          <td mat-cell *matCellDef="let row">{{ row.name | titlecase }}</td>
        </ng-container>

        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Email</th>
          <td mat-cell *matCellDef="let row">{{ row.email | lowercase }}</td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>&nbsp;</th>
          <td mat-cell *matCellDef="let row">
            <button
              mat-icon-button
              color="primary"
              matTooltip="Editar usuário"
              [routerLink]="['/usuarios', row.id]"
            >
              <mat-icon class="edit-icon">edit</mat-icon>
            </button>
            <button
              mat-icon-button
              color="warn"
              matTooltip="Excluir usuário"
              (click)="deleteUser(row)"
            >
              <mat-icon class="delete-icon">delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell" colspan="5">
            Nenhum dado encontrado para "{{ input.value }}"
          </td>
        </tr>
      </table>

      <mat-paginator
        [pageSizeOptions]="[5, 10, 25, 50]"
        aria-label="Selecione a página"
      >
      </mat-paginator>
    </div>
  </div>
</div>
